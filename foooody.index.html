                  </>
                ) : (
                  <div className="mb-8 text-center sm:text-left">
                    <h2 className="font-serif text-2xl font-bold text-stone-900 flex items-center justify-center sm:justify-start gap-2">
                      <Bookmark className="w-6 h-6 text-amber-600" fill="#d97706" />
                      나의 스크랩북 아카이브
                    </h2>
                    <p className="text-stone-500 text-sm mt-1">내가 가고 싶어서 찜해둔 소중한 서울 맛집들</p>
                  </div>
                )}

                {/* Grid List */}
                <div className="mb-6 flex justify-between items-center border-b border-stone-200 pb-3">
                  <h2 className="text-xs font-bold tracking-[0.2em] text-stone-500 uppercase">
                    {activeTab === 'magazine' ? 'COLLECTION ARCHIVES' : `SAVED ITEMS (${filteredRestaurants.length})`}
                  </h2>
                  <span className="text-xs text-stone-500">
                    총 <span className="font-bold text-stone-900">{filteredRestaurants.length}</span>개의 미식 탐색됨
                  </span>
                </div>

                {filteredRestaurants.length === 0 ? (
                  <div className="bg-white rounded-2xl border border-stone-200 p-16 text-center max-w-xl mx-auto my-10 space-y-4">
                    <Utensils className="w-12 h-12 text-stone-300 mx-auto" />
                    <h3 className="font-serif text-lg font-bold text-stone-800">해당하는 미식 콘텐츠가 없습니다.</h3>
                    <p className="text-stone-500 text-sm leading-relaxed">
                      다른 자치구를 선택하시거나, 검색어 조건을 변경해보세요.
                    </p>
                    {searchQuery && (
                      <button 
                        onClick={() => setSearchQuery("")}
                        className="px-4 py-2 bg-stone-900 text-white rounded-lg text-xs font-semibold hover:bg-stone-800 transition-colors"
                      >
                        검색 조건 초기화
                      </button>
                    )}
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {filteredRestaurants.map((res) => (
                      <article 
                        key={res.id}
                        onClick={() => setSelectedRestaurant(res)}
                        className="group bg-white rounded-2xl overflow-hidden border border-stone-200 hover:border-stone-400 hover:shadow-xl transition-all duration-300 cursor-pointer flex flex-col h-full"
                      >
                        <div className="h-56 relative overflow-hidden bg-stone-100">
                          <img 
                            src={res.image} 
                            alt={res.name} 
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                          />
                          <div className="absolute inset-0 bg-gradient-to-t from-stone-950/40 via-transparent to-transparent"></div>
                          <span className="absolute bottom-4 left-4 px-2.5 py-1 bg-white/95 backdrop-blur-sm text-stone-900 text-[11px] font-bold tracking-wider uppercase rounded">
                            {res.category}
                          </span>
                          <button 
                            onClick={(e) => toggleBookmark(res.id, e)}
                            className="absolute top-4 right-4 p-2 rounded-full bg-white/95 backdrop-blur-sm text-stone-600 hover:text-amber-600 shadow-md transition-colors"
                          >
                            <Bookmark className="w-4 h-4" fill={bookmarks.includes(res.id) ? "#f59e0b" : "none"} />
                          </button>
                          {res.editorPick && (
                            <span className="absolute top-4 left-4 bg-amber-500 text-stone-950 font-bold text-[10px] px-2 py-1 rounded tracking-widest shadow">
                              EDITOR'S PICK
                            </span>
                          )}
                        </div>

                        <div className="p-6 flex flex-col justify-between flex-grow space-y-4">
                          <div className="space-y-2">
                            <div className="flex justify-between items-center text-xs text-stone-400">
                              <span className="flex items-center gap-1 font-semibold text-stone-500">
                                <MapPin className="w-3.5 h-3.5 text-amber-600" />
                                {res.gu}
                              </span>
                              <div className="flex items-center space-x-1">
                                <Star className="w-3.5 h-3.5 fill-amber-400 text-amber-400" />
                                <span className="font-bold text-stone-700">{res.rating}</span>
                              </div>
                            </div>

                            <h3 className="font-serif text-xl font-bold text-stone-900 group-hover:text-amber-600 transition-colors">
                              {res.name}
                            </h3>

                            <p className="text-stone-600 text-sm leading-relaxed line-clamp-2 italic font-serif">
                              "{res.summary}"
                            </p>
                          </div>

                          <div className="space-y-3 pt-4 border-t border-stone-100">
                            <div className="flex flex-wrap gap-1">
                              {res.tags.slice(0, 3).map((tag, i) => (
                                <span key={i} className="text-[10px] text-stone-500 bg-stone-100 px-2 py-0.5 rounded">
                                  #{tag}
                                </span>
                              ))}
                            </div>

                            <div className="flex justify-between items-center text-xs text-stone-400">
                              <span className="flex items-center gap-1">
                                <DollarSign className="w-3.5 h-3.5 text-stone-400" />
                                {res.priceRange.split(" ")[0]}~
                              </span>
                              <span className="text-stone-900 font-bold flex items-center gap-0.5 group-hover:translate-x-1 transition-transform">
                                자세히 읽기 <ChevronRight className="w-4 h-4" />
                              </span>
                            </div>
                          </div>
                        </div>
                      </article>
                    ))}
                  </div>
                )}
              </main>

              {/* ================= MODAL DETAIL ================= */}
              {selectedRestaurant && (
                <div className="fixed inset-0 z-50 bg-stone-950/75 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
                  <div className="bg-white rounded-3xl w-full max-w-4xl shadow-2xl overflow-hidden border border-stone-200 max-h-[90vh] flex flex-col">
                    <div className="flex justify-between items-center px-6 py-4 border-b border-stone-100 bg-stone-50">
                      <span className="font-serif text-xs font-bold tracking-[0.2em] text-stone-500 uppercase">
                        SEOUL GOURMET ESSENTIALS
                      </span>
                      <button 
                        onClick={() => setSelectedRestaurant(null)}
                        className="p-1.5 rounded-full hover:bg-stone-200 text-stone-600 transition-colors"
                      >
                        <XIcon className="w-6 h-6" />
                      </button>
                    </div>

                    <div className="overflow-y-auto flex-1">
                      <div className="h-64 sm:h-80 relative bg-stone-100">
                        <img 
                          src={selectedRestaurant.image} 
                          alt={selectedRestaurant.name} 
                          className="w-full h-full object-cover"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-stone-950/70 via-stone-950/30 to-transparent"></div>
                        <div className="absolute bottom-6 left-6 right-6 text-white space-y-2">
                          <div className="flex items-center space-x-2">
                            <span className="px-2.5 py-0.5 bg-amber-500 text-stone-950 font-bold text-[10px] tracking-wider uppercase rounded">
                              {selectedRestaurant.category}
                            </span>
                            <span className="text-xs font-semibold text-stone-200">
                              {selectedRestaurant.gu} 아카이브
                            </span>
                          </div>
                          <h2 className="font-serif text-3xl sm:text-4xl font-bold tracking-tight">
                            {selectedRestaurant.name}
                          </h2>
                        </div>
                      </div>

                      <div className="p-6 sm:p-8 grid grid-cols-1 md:grid-cols-12 gap-8">
                        <div className="md:col-span-7 space-y-6">
                          <div>
                            <h3 className="text-xs font-bold tracking-[0.15em] text-stone-400 uppercase mb-2">
                              THE STORY
                            </h3>
                            <p className="font-serif text-lg text-amber-800 italic leading-relaxed border-l-4 border-amber-600 pl-4 mb-4">
                              "{selectedRestaurant.summary}"
                            </p>
                            <p className="text-stone-700 text-sm sm:text-base leading-relaxed whitespace-pre-line font-light">
                              {selectedRestaurant.description}
                            </p>
                          </div>

                          <div className="bg-stone-50 rounded-2xl p-5 border border-stone-200">
                            <h4 className="font-serif text-sm font-bold text-stone-800 mb-3 flex items-center gap-1.5">
                              <Utensils className="w-4 h-4 text-amber-600" />
                              에디터 강력 추천 메뉴
                            </h4>
                            <ul className="space-y-2.5">
                              {selectedRestaurant.signatureMenu.map((menu, idx) => (
                                <li key={idx} className="flex justify-between items-center text-xs sm:text-sm border-b border-stone-200/50 pb-1.5 last:border-0 last:pb-0">
                                  <span className="font-medium text-stone-800 flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-amber-600"></span>
                                    {menu.split(" (")[0]}
                                  </span>
                                  <span className="font-mono text-amber-700 font-bold">
                                    {menu.includes("(") ? menu.split(" (")[1].replace(")", "") : ""}
                                  </span>
                                </li>
                              ))}
                            </ul>
                          </div>

                          <div className="bg-amber-50/50 border border-amber-200/60 rounded-2xl p-5">
                            <h4 className="font-serif text-sm font-bold text-amber-900 mb-2 flex items-center gap-1.5">
                              <BookOpen className="w-4 h-4 text-amber-700" />
                              에디터의 한 줄 평 (Editor's Note)
                            </h4>
                            <p className="text-stone-700 text-xs sm:text-sm leading-relaxed italic">
                              {selectedRestaurant.editorNote}
                            </p>
                          </div>
                        </div>

                        <div className="md:col-span-5 space-y-6">
                          <div className="bg-stone-50 rounded-2xl p-5 border border-stone-200 space-y-4">
                            <h3 className="text-xs font-bold tracking-[0.15em] text-stone-400 uppercase">
                              ESSENTIAL INFO
                            </h3>

                            <div className="space-y-3.5 text-xs sm:text-sm">
                              <div className="flex items-start gap-3">
                                <span className="text-amber-500 shrink-0 mt-0.5"><Star className="w-5 h-5 fill-amber-500" /></span>
                                <div>
                                  <div className="font-bold text-stone-800">에디터 평점</div>
                                  <div className="text-stone-500 mt-0.5">{selectedRestaurant.rating} / 5.0 (추천 지수 상위 2%)</div>
                                </div>
                              </div>

                              <div className="flex items-start gap-3">
                                <span className="text-stone-500 shrink-0 mt-0.5"><MapPin className="w-5 h-5" /></span>
                                <div>
                                  <div className="font-bold text-stone-800">찾아가는 길</div>
                                  <div className="text-stone-500 mt-0.5">{selectedRestaurant.address}</div>
                                </div>
                              </div>

                              <div className="flex items-start gap-3">
                                <span className="text-stone-500 shrink-0 mt-0.5"><Clock className="w-5 h-5" /></span>
                                <div>
                                  <div className="font-bold text-stone-800">영업 시간</div>
                                  <div className="text-stone-500 mt-0.5">{selectedRestaurant.hours}</div>
                                </div>
                              </div>

                              <div className="flex items-start gap-3">
                                <span className="text-stone-500 shrink-0 mt-0.5"><DollarSign className="w-5 h-5" /></span>
                                <div>
                                  <div className="font-bold text-stone-800">예산 가이드</div>
                                  <div className="text-stone-500 mt-0.5">{selectedRestaurant.priceRange}</div>
                                </div>
                              </div>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <button 
                              onClick={(e) => toggleBookmark(selectedRestaurant.id, e)}
                              className={`flex items-center justify-center space-x-2 py-3 px-4 rounded-xl text-sm font-semibold border transition-all ${
                                bookmarks.includes(selectedRestaurant.id)
                                  ? "bg-amber-600 text-white border-amber-600"
                                  : "bg-white text-stone-700 hover:bg-stone-50 border-stone-200"
                              }`}
                            >
                              <Bookmark className="w-4 h-4" fill={bookmarks.includes(selectedRestaurant.id) ? "white" : "none"} />
                              <span>{bookmarks.includes(selectedRestaurant.id) ? "스크랩됨" : "스크랩하기"}</span>
                            </button>
                            <button 
                              onClick={(e) => toggleLike(selectedRestaurant.id, e)}
                              className="flex items-center justify-center space-x-2 py-3 px-4 rounded-xl text-sm font-semibold bg-stone-900 text-white hover:bg-stone-800 border border-stone-900 transition-all"
                            >
                              <ThumbsUp className="w-4 h-4" />
                              <span>추천 ({likeCounts[selectedRestaurant.id] || 0})</span>
                            </button>
                          </div>

                          <div className="flex flex-wrap gap-1.5 pt-2">
                            {selectedRestaurant.tags.map((tag, idx) => (
                              <span key={idx} className="text-xs text-stone-600 bg-stone-100 border border-stone-200/60 px-3 py-1 rounded-full">
                                #{tag}
                              </span>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="px-6 py-4 border-t border-stone-100 bg-stone-50 flex justify-end">
                      <button 
                        onClick={() => setSelectedRestaurant(null)}
                        className="px-5 py-2 bg-stone-900 text-white rounded-xl text-xs font-bold hover:bg-stone-800 transition-colors"
                      >
                        매거진 닫기
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* ================= FOOTER ================= */}
              <footer className="border-t border-stone-200 bg-white mt-20 py-12">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-4">
                  <div className="font-serif text-lg font-bold tracking-widest text-stone-900">
                    SEOUL GOURMET JOURNAL
                  </div>
                  <p className="text-stone-500 text-xs max-w-md mx-auto leading-relaxed">
                    본 콘텐츠는 에디터들이 직접 답사하고 시식한 고품격 서울 가이드입니다. 2026 트렌드와 미식을 기준으로 주기적으로 갱신됩니다.
                  </p>
                  <div className="text-stone-400 text-[10px] uppercase tracking-wider">
                    © 2026 SEOUL GOURMET JOURNAL. ALL RIGHTS RESERVED.
                  </div>
                </div>
              </footer>

            </div>
          );
        }

        // Mount React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
